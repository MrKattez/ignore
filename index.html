<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diaper Terminal</title>
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  font-family:monospace;
  color:#ffee00;
}

.terminal, .soiledPage {
  padding:20px;
  box-sizing:border-box;
  width:100%;
  height:100%;
}

.cursor {
  display:inline-block;
  width:8px;
  height:14px;
  background:#ffee00;
  animation:blink 1s steps(1) infinite;
}

@keyframes blink {
  0%,100%{opacity:1}
  50%{opacity:0}
}

.window {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  height:300px;
  background:#0a0a0a;
  border:1px solid #ffee00;
  padding:20px;
}

.soiledPage {
  display:none;
  text-align:center;
  background:#000;
  color:#ff4444;
}

.soiledPage iframe {
  width:80%;
  height:60%;
  margin-top:20px;
  border:none;
}
</style>
</head>
<body>

<div id="terminal" class="terminal"></div>

<div id="soiled" class="soiledPage">
  <h1>soiled</h1>

  <iframe id="ytPlayer"
    src=""
    allow="autoplay; encrypted-media; fullscreen"
    allowfullscreen>
  </iframe>
</div>

<script>
const terminal = document.getElementById('terminal');
const soiledPage = document.getElementById('soiled');

let progress = 0;
let systemOn = false;
let showWindow = false;
let enteredSoiled = false;

const bootLines = [
  "booting executable: diaper.top",
  "initializing system...",
  "loading core modules...",
  "ready"
];

// Boot animation
let i = 0;
const bootInterval = setInterval(()=>{
  if(i < bootLines.length){
    const div = document.createElement('div');
    div.textContent = "> " + bootLines[i++];
    terminal.appendChild(div);
  } else {
    clearInterval(bootInterval);
    showWindow = true;
    renderUI();
  }
}, 400);

function renderUI(){
  if(!showWindow || enteredSoiled) return;

  const btn = document.createElement('button');
  btn.textContent = systemOn ? "System ON" : "System OFF";
  btn.style.marginTop = "20px";

  btn.onclick = ()=>{
    systemOn = !systemOn;

    if(!systemOn && progress >= 100){
      triggerSoiled();
    }
  };

  terminal.appendChild(btn);
}

// Progress simulation
setInterval(()=>{
  if(systemOn && !enteredSoiled){
    progress += 5;
    if(progress > 100) progress = 100;
  }
}, 500);

// Show soiled page + video
function triggerSoiled(){
  enteredSoiled = true;

  terminal.style.display = "none";
  soiledPage.style.display = "block";

  const yt = document.getElementById('ytPlayer');

  yt.src = "https://www.youtube-nocookie.com/embed/p7wtblI5Tts?autoplay=1&controls=1";
}
</script>

</body>
</html>
