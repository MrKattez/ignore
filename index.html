<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diaper Terminal</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; background:#000; font-family:monospace; color:#ffee00; }
.terminal, .soiledPage { padding:20px; box-sizing:border-box; line-height:1.6; width:100%; height:100%; position:relative; overflow:hidden; }
.cursor { display:inline-block; width:8px; height:14px; background:#ffee00; animation:blink 1s steps(1) infinite; }
@keyframes blink {0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse {0%{transform:scale(1)}100%{transform:scale(1.3)}}
.window { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:420px; height:360px; background:#0a0a0a; border:1px solid #ffee00; box-shadow:0 0 20px rgba(255,255,0,0.25); overflow:hidden; }
.buttons { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
.btn { padding:5px 10px; border:1px solid #ffee00; cursor:pointer; color:#000; }
.btn.off { background:#555; cursor:not-allowed; }
.btn.on { background:#00ff00; }
.btn.shock { background:#ffee00; }
.progress-container { height:12px; background:#222; border-radius:6px; overflow:hidden; margin-bottom:15px; position:relative; }
.progress-bar { height:100%; background: linear-gradient(90deg,#ff4444,#ffee00); transition: width 0.2s ease; }
.heart { position:absolute; right:5px; top:-2px; color:#ff4444; display:inline-block; transform-origin:center center; animation:pulse 1s infinite alternate; }
.soiledPage pre { font-size:18px; line-height:20px; }
.soiledPage iframe { margin-top:20px; border:none; }
</style>
</head>
<body>
<div id="terminal" class="terminal"></div>

<div id="soiled" class="soiledPage" style="display:none; background:#000; color:#ff4444;">
  <pre>soiled</pre>
  <iframe id="ytPlayer" width="560" height="315" src="" allow="autoplay" allowfullscreen></iframe>
</div>

<script>
const terminal = document.getElementById('terminal');
const soiledPage = document.getElementById('soiled');

let lines=[], showWindow=false, ageGate=true, blocked=false;
let systemOn=false, hypno=false, shockActive=false, progress=0, cumPulse=false;
let vibratorEnabled=false, showClimax=false, enteredSoiled=false;

const bootLines = [
  "booting executable: diaper.top",
  "initializing system...",
  "loading core modules...",
  "binding interface...",
  "allocating control channel...",
  "ready"
];

// Boot sequence line by line
let i=0;
const bootInterval = setInterval(()=>{
  if(i<bootLines.length){
    lines.push(bootLines[i++]); renderTerminal();
  } else { clearInterval(bootInterval); setTimeout(()=>{ showWindow=true; renderTerminal(); },500); }
},350);

// Vibrator unlock after 10 min
setTimeout(()=>{ vibratorEnabled=true; renderTerminal(); },10*60*1000);

// Hypno direction for pulsing 0-95%
let hypnoDirection = 1; 

function renderTerminal(){
  if(enteredSoiled) return;
  terminal.innerHTML='';
  
  // Boot lines
  lines.forEach(line=>{ 
    const div=document.createElement('div'); 
    div.textContent='> '+line; 
    terminal.appendChild(div); 
  });
  
  const cursor = document.createElement('div'); cursor.className='cursor';
  const lineDiv=document.createElement('div'); lineDiv.textContent='> '; lineDiv.appendChild(cursor);
  terminal.appendChild(lineDiv);

  if(showWindow){
    const win = document.createElement('div'); win.className='window';

    // Heart pattern background
    if(!ageGate && !blocked){
      const pre = document.createElement('pre');
      pre.style.position='absolute'; pre.style.top='0'; pre.style.left='0'; pre.style.width='100%';
      pre.style.height='100%'; pre.style.margin='0'; pre.style.padding='15px';
      pre.style.fontSize='12px'; pre.style.lineHeight='14px'; pre.style.color='#ffee00';
      pre.style.opacity='0.15'; pre.style.pointerEvents='none';
      pre.textContent=`*     *     *   *
  ♥     ♥     ♥
*     *     *   *
  ♥     ♥     ♥
*     *     *   *`;
      win.appendChild(pre);
    }

    const content = document.createElement('div'); 
    content.style.position='relative'; 
    content.style.zIndex='1'; 
    content.style.padding='15px';

    if(ageGate && !blocked){
      const div=document.createElement('div'); div.style.marginBottom='15px'; div.textContent='Are you 18+?';
      const yes=document.createElement('button'); yes.textContent='Yes'; yes.className='btn on'; yes.style.marginRight='10px';
      yes.onclick=()=>{ ageGate=false; renderTerminal(); };
      const no=document.createElement('button'); no.textContent='No'; no.className='btn off';
      no.onclick=()=>{ blocked=true; renderTerminal(); };
      content.appendChild(div); content.appendChild(yes); content.appendChild(no);
    }

    if(blocked){ const div=document.createElement('div'); div.style.color='#ff4444'; div.textContent='installation aborted'; content.appendChild(div); }

    if(!ageGate && !blocked){
      const label=document.createElement('div'); label.style.marginBottom='10px'; label.textContent='system control'; content.appendChild(label);
      const progLabel=document.createElement('div'); progLabel.style.marginBottom='10px'; progLabel.style.fontSize='12px';
      progLabel.textContent='climax meter '+Math.round(progress)+'%'; content.appendChild(progLabel);

      const progContainer=document.createElement('div'); progContainer.className='progress-container';
      const progBar=document.createElement('div'); progBar.className='progress-bar'; progBar.style.width=progress+'%';
      const heart=document.createElement('span'); heart.className='heart'; heart.style.fontSize=(14+progress/100*12)+'px';
      if(cumPulse) heart.style.filter='drop-shadow(0 0 6px #ff4444)'; heart.textContent='♥';
      progContainer.appendChild(progBar); progContainer.appendChild(heart); content.appendChild(progContainer);

      const btnDiv=document.createElement('div'); btnDiv.className='buttons';
      const sysBtn=document.createElement('button'); sysBtn.className='btn '+(systemOn?'on':'off'); sysBtn.textContent='System: '+(systemOn?'ON':'OFF');
      sysBtn.onclick=()=>{ handleSystemToggle(); }; btnDiv.appendChild(sysBtn);

      const vibBtn=document.createElement('button'); vibBtn.className='btn '+(vibratorEnabled?'on':'off'); vibBtn.textContent='Vibrator'; btnDiv.appendChild(vibBtn);

      const hypBtn=document.createElement('button'); hypBtn.className='btn '+((hypno && systemOn)?'on':'off'); hypBtn.textContent='Hypno: '+(hypno?'ON':'OFF');
      if(systemOn) hypBtn.onclick=()=>{ hypno=!hypno; renderTerminal(); }; btnDiv.appendChild(hypBtn);

      const shockBtn=document.createElement('button'); shockBtn.className='btn shock'; shockBtn.textContent='Shock';
      if(systemOn) shockBtn.onclick=()=>{ shockActive=true; progress=Math.min(progress+15,100); renderTerminal(); setTimeout(()=>{ shockActive=false; renderTerminal(); },600); };
      btnDiv.appendChild(shockBtn);

      content.appendChild(btnDiv);

      // Climax after power off
      if(showClimax && !systemOn){
        const climax=document.createElement('div'); climax.style.color='#ff0000'; climax.style.marginTop='10px';
        climax.style.fontSize='14px'; climax.textContent='Climax achieved!';
        content.appendChild(climax);
      }
    }

    win.appendChild(content); terminal.appendChild(win);
  }
}

// System toggle
function handleSystemToggle(){
  if(systemOn && progress>=100){ showClimax=true; }
  systemOn=!systemOn;
  if(!systemOn) hypno=false;
  renderTerminal();
  if(showClimax && !systemOn && !enteredSoiled){
    setTimeout(()=>{
      enteredSoiled=true;
      terminal.style.display='none';
      soiledPage.style.display='block';

      // Play YouTube video automatically
      const yt = document.getElementById('ytPlayer');
      yt.src = "https://www.youtube.com/embed/p7wtblI5Tts?autoplay=1&mute=1&controls=0";
    },500);
  }
}

// Progress auto-increment
setInterval(()=>{
  if(!enteredSoiled && systemOn){
    if(hypno){
      progress += hypnoDirection * 0.05; // slow realistic pulsing
      if(progress>=95){ hypnoDirection=-1; progress=95; }
      if(progress<=0){ hypnoDirection=1; progress=0; }
    } else {
      progress = Math.min(progress + 0.1,100);
    }
    if(progress>=100) cumPulse=true;
    renderTerminal();
  }
},500);

</script>
</body>
</html>
</body>
</html>
